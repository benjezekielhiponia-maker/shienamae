<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shiena Mae</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #f8f1f1, #f6e6ff);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .container {
    text-align: center;
  }

  /* Envelope */
  .envelope {
    width: 320px;
    height: 200px;
    position: relative;
    margin: auto;
    cursor: pointer;
  }

  .front {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #fff;
    border: 2px solid #d8cfcf;
    border-radius: 8px;
    z-index: 2;
  }

  .flap {
    position: absolute;
    width: 0;
    height: 0;
    border-left: 160px solid transparent;
    border-right: 160px solid transparent;
    border-bottom: 100px solid #e6d6d6;
    top: 0;
    transform-origin: top;
    transition: 0.6s ease;
    z-index: 3;
  }

  .letter {
    position: absolute;
    width: 100%;
    height: 100%;
    background: white;
    border-radius: 8px;
    padding: 15px;
    box-sizing: border-box;
    z-index: 1;
    opacity: 0;
    transform: translateY(20px);
    transition: 0.6s ease;
  }

  textarea {
    width: 100%;
    height: 100%;
    border: none;
    outline: none;
    resize: none;
    font-family: Arial, sans-serif;
    font-size: 14px;
  }

  /* Open state */
  .open .flap {
    transform: rotateX(180deg);
  }

  .open .letter {
    opacity: 1;
    transform: translateY(-10px);
  }

  .title {
    margin-bottom: 15px;
    font-size: 22px;
    color: #3b2f2f;
  }

  .hint {
    margin-top: 10px;
    color: #777;
    font-size: 10px;
  }
</style>
</head>

<body>

<div class="container">
  <div class="title">yena.yema </div>

  <div class="envelope" onclick="openEnvelope(this)">
    <div class="flap"></div>
    <div class="front"></div>

    <div class="letter">
      <textarea placeholder="Hello, Shienaaa. Last message ko na 'to for real for real. I want to thank you for such a wonderful-bitter time. I think I met the happiest version of myself when we found ourselves way back to each other. I really wanna give you my gifts in person but you know that we ended talking to each other(June 14 ko 'to ginawa). Just so you know, I loved you within the deepness of my whole body. Maybe, I love you so great that I chose to distance myself(the devil in me rawrr). Kidding aside, I really love you to my fullest as I mentally can. Unfortunately, it's me vs you and I—and I can't go against myself. Pasensya na kung hindi ko na talaga maintindihan sarili ko ngayon. Mahal naman talaga kita nang sobra and I think dadalhin ko iyan kahit kanino. Mahal na mahal kita, itanong mo pa sa lahat ng kaibigan, pamilya, or mga kakilala ko. Sorry, nonsense lang 'yung irarason ko kung bakit gusto ko na i-end, so I expect na magagalit ka. Pero being for real, gusto ko na talaga tumigil not because of anything or what but me. I know I can't handle such things as physically loving you to the fullest(sinabi ko kanina mentally lang, panis connected). Ewan, maybe some things are hindering myself to resist the urge to love you freely. Also, some matters such as not being legal to your parents is a plus. I don't have that much to say but I wish you the happiest birthday. May your dreams come your way and let it be. I hope for your best and please be good to yourself. Don't let people be advantageous of you. I love you, love. Happiest 19th birthday!<3 
‎
‎(Dagdag ko lang, pasensya na kung nagparamdam pa. Nawa'y huwag na tayo magtagpo. Mahal na mahal kita)"></textarea>
    </div>
  </div>

  <div class="hint">Huwag Pindutin(Nakamamatay)div>
</div>

<script>
  function openEnvelope(el) {
    el.classList.toggle("open");
  }
</script>

</body>
</html>
